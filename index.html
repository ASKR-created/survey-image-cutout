<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>White Cutout Viewer</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f4f1eb;
        --panel: #ffffff;
        --text: #202326;
        --muted: #697079;
        --line: #d8d2c7;
        --accent: #236b5e;
        --checker-a: #f8f8f8;
        --checker-b: #dedede;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #151718;
          --panel: #202326;
          --text: #f3f5f5;
          --muted: #a8afb6;
          --line: #363b40;
          --accent: #58c7b4;
          --checker-a: #2f3337;
          --checker-b: #24272a;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px clamp(16px, 4vw, 36px);
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--panel) 92%, transparent);
      }

      h1 {
        margin: 0;
        font-size: clamp(20px, 3vw, 30px);
        font-weight: 720;
        letter-spacing: 0;
      }

      .controls {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        flex-wrap: wrap;
      }

      .button,
      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
        font: inherit;
        font-size: 14px;
        font-weight: 650;
        text-decoration: none;
      }

      button.primary {
        border-color: color-mix(in srgb, var(--accent) 60%, var(--line));
        background: var(--accent);
        color: white;
      }

      button:disabled {
        cursor: default;
        opacity: 0.5;
      }

      input[type="file"] {
        position: absolute;
        inline-size: 1px;
        block-size: 1px;
        opacity: 0;
      }

      .range {
        display: grid;
        grid-template-columns: auto minmax(110px, 160px) 34px;
        align-items: center;
        gap: 8px;
        min-height: 40px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--muted);
        font-size: 13px;
      }

      input[type="range"] {
        accent-color: var(--accent);
      }

      .stage {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 1px;
        min-height: 0;
        background: var(--line);
      }

      .pane {
        display: grid;
        grid-template-rows: auto 1fr;
        min-width: 0;
        background: var(--bg);
      }

      .pane-title {
        padding: 10px 14px;
        color: var(--muted);
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--panel) 86%, transparent);
        font-size: 13px;
        font-weight: 650;
      }

      .preview {
        display: grid;
        place-items: center;
        overflow: auto;
        padding: 20px;
        background-image:
          linear-gradient(45deg, var(--checker-a) 25%, transparent 25%),
          linear-gradient(-45deg, var(--checker-a) 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, var(--checker-a) 75%),
          linear-gradient(-45deg, transparent 75%, var(--checker-a) 75%);
        background-position: 0 0, 0 10px, 10px -10px, -10px 0;
        background-size: 20px 20px;
        background-color: var(--checker-b);
      }

      img,
      canvas {
        max-width: min(100%, 900px);
        max-height: calc(100vh - 155px);
        object-fit: contain;
        box-shadow: 0 10px 30px rgb(0 0 0 / 14%);
      }

      .empty {
        max-width: 360px;
        color: var(--muted);
        text-align: center;
        line-height: 1.7;
      }

      @media (max-width: 820px) {
        header {
          align-items: flex-start;
          flex-direction: column;
        }

        .controls {
          justify-content: flex-start;
        }

        .stage {
          grid-template-columns: 1fr;
        }

        img,
        canvas {
          max-height: 58vh;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>White Cutout Viewer</h1>
        <div class="controls">
          <label class="button" for="file">画像を選択</label>
          <input id="file" type="file" accept="image/png,image/jpeg,image/webp,image/gif" />
          <label class="range">
            しきい値
            <input id="threshold" type="range" min="210" max="255" value="245" />
            <span id="threshold-value">245</span>
          </label>
          <button id="download" class="primary" type="button" disabled>PNG保存</button>
        </div>
      </header>

      <section class="stage" aria-label="image previews">
        <article class="pane">
          <div class="pane-title">元画像</div>
          <div class="preview">
            <p id="empty-original" class="empty">画像を選択すると、左に元画像、右に白をくりぬいた結果が表示されます。</p>
            <img id="original" alt="Original image" hidden />
          </div>
        </article>

        <article class="pane">
          <div class="pane-title">白抜き後</div>
          <div class="preview">
            <p id="empty-result" class="empty">白や白に近い背景を透明にします。線や色はできるだけ残します。</p>
            <canvas id="result" hidden></canvas>
          </div>
        </article>
      </section>
    </main>

    <script>
      const fileInput = document.querySelector("#file");
      const thresholdInput = document.querySelector("#threshold");
      const thresholdValue = document.querySelector("#threshold-value");
      const downloadButton = document.querySelector("#download");
      const original = document.querySelector("#original");
      const canvas = document.querySelector("#result");
      const context = canvas.getContext("2d", { willReadFrequently: true });
      const emptyOriginal = document.querySelector("#empty-original");
      const emptyResult = document.querySelector("#empty-result");
      let sourceImage;
      let objectUrl;

      function removeWhite() {
        if (!sourceImage) return;

        const threshold = Number(thresholdInput.value);
        thresholdValue.textContent = String(threshold);
        canvas.width = sourceImage.naturalWidth;
        canvas.height = sourceImage.naturalHeight;
        context.clearRect(0, 0, canvas.width, canvas.height);
        context.drawImage(sourceImage, 0, 0);

        const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        for (let i = 0; i < data.length; i += 4) {
          const red = data[i];
          const green = data[i + 1];
          const blue = data[i + 2];
          const whiteness = Math.min(red, green, blue);
          const colorSpread = Math.max(red, green, blue) - whiteness;

          if (whiteness >= threshold && colorSpread <= 18) {
            const fade = Math.min(1, (whiteness - threshold) / Math.max(1, 255 - threshold));
            data[i + 3] = Math.round(data[i + 3] * (1 - fade));
          }
        }

        context.putImageData(imageData, 0, 0);
        canvas.hidden = false;
        emptyResult.hidden = true;
        downloadButton.disabled = false;
      }

      fileInput.addEventListener("change", () => {
        const file = fileInput.files && fileInput.files[0];
        if (!file) return;

        if (objectUrl) URL.revokeObjectURL(objectUrl);
        objectUrl = URL.createObjectURL(file);
        sourceImage = new Image();
        sourceImage.onload = () => {
          original.src = objectUrl;
          original.hidden = false;
          emptyOriginal.hidden = true;
          removeWhite();
        };
        sourceImage.src = objectUrl;
      });

      thresholdInput.addEventListener("input", removeWhite);

      downloadButton.addEventListener("click", () => {
        const link = document.createElement("a");
        link.download = "white-cutout.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    </script>
  </body>
</html>
