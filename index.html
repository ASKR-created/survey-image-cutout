<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Survey 3D Filter Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #eef1ee;
        --panel: #ffffff;
        --text: #1d2328;
        --muted: #65707a;
        --line: #d6dce0;
        --accent: #0f6f62;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #141719;
          --panel: #202529;
          --text: #f2f5f6;
          --muted: #a7b0b8;
          --line: #343b41;
          --accent: #55c7b4;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 12px clamp(14px, 3vw, 32px);
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--panel) 92%, transparent);
      }

      h1 {
        margin: 0;
        font-size: clamp(18px, 2.5vw, 28px);
        font-weight: 720;
        letter-spacing: 0;
      }

      .controls {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        flex-wrap: wrap;
      }

      button,
      label {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
        font: inherit;
        font-size: 14px;
        font-weight: 650;
      }

      button[aria-pressed="true"] {
        border-color: color-mix(in srgb, var(--accent) 70%, var(--line));
        background: var(--accent);
        color: #fff;
      }

      input[type="file"] {
        position: absolute;
        inline-size: 1px;
        block-size: 1px;
        opacity: 0;
      }

      .viewer-shell {
        position: relative;
        min-height: 0;
        overflow: hidden;
        cursor: grab;
        user-select: none;
        touch-action: none;
      }

      .viewer-shell.dragging {
        cursor: grabbing;
      }

      .demo-space {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        perspective: 900px;
        background:
          linear-gradient(to bottom, rgb(217 228 230), rgb(238 241 238)),
          radial-gradient(circle at 50% 28%, #fff 0, transparent 48%);
      }

      .demo-floor {
        position: absolute;
        bottom: -14vh;
        width: 140vw;
        height: 58vh;
        transform: rotateX(68deg);
        transform-origin: center bottom;
        background-image:
          linear-gradient(color-mix(in srgb, var(--accent) 28%, transparent) 1px, transparent 1px),
          linear-gradient(90deg, color-mix(in srgb, var(--accent) 28%, transparent) 1px, transparent 1px);
        background-size: 44px 44px;
        opacity: 0.72;
      }

      .demo-axis {
        position: absolute;
        width: 240px;
        height: 240px;
        transform-style: preserve-3d;
        transform: rotateX(var(--demo-tilt, -18deg)) rotateY(var(--demo-turn, 38deg));
        transition: transform 80ms linear;
      }

      .demo-axis::before,
      .demo-axis::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        background: var(--accent);
        transform-origin: left center;
      }

      .demo-axis::before {
        width: 210px;
        height: 4px;
        transform: translateY(-2px);
      }

      .demo-axis::after {
        width: 4px;
        height: 210px;
        transform: translateX(-2px) translateY(-105px);
      }

      .demo-card {
        position: absolute;
        top: 18px;
        left: 18px;
        max-width: min(390px, calc(100vw - 36px));
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: color-mix(in srgb, var(--panel) 94%, transparent);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      model-viewer {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        min-height: calc(100vh - 63px);
        background: transparent;
        --progress-bar-color: var(--accent);
        --poster-color: transparent;
      }

      body.no-model model-viewer {
        opacity: 0.01;
        pointer-events: none;
      }

      .subjective-filter {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: grid;
        place-items: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 160ms ease;
      }

      .subjective-filter.active {
        opacity: 1;
      }

      .subjective-filter img {
        width: min(100vw, 100vh * 1.43);
        height: auto;
        max-height: 100vh;
        object-fit: contain;
      }

      .filter-reticle {
        position: relative;
        display: none;
        width: min(72vw, 72vh);
        aspect-ratio: 1;
        border: 4px solid #082d3b;
        border-radius: 50%;
      }

      .filter-reticle::before,
      .filter-reticle::after {
        content: "";
        position: absolute;
        background: #1671b7;
      }

      .filter-reticle::before {
        left: 50%;
        top: -8%;
        width: 2px;
        height: 116%;
        transform: translateX(-1px);
      }

      .filter-reticle::after {
        left: -8%;
        top: 50%;
        width: 116%;
        height: 2px;
        transform: translateY(-1px);
      }

      .subjective-filter.use-reticle img {
        display: none;
      }

      .subjective-filter.use-reticle .filter-reticle {
        display: block;
      }

      .status {
        position: absolute;
        z-index: 3;
        left: 14px;
        bottom: 14px;
        max-width: min(520px, calc(100vw - 28px));
        padding: 9px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: color-mix(in srgb, var(--panel) 92%, transparent);
        color: var(--muted);
        font-size: 13px;
      }

      .fallback {
        display: grid;
        place-items: center;
        min-height: calc(100vh - 63px);
        padding: 24px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 760px) {
        header {
          align-items: flex-start;
          flex-direction: column;
        }

        .controls {
          justify-content: flex-start;
        }

        model-viewer {
          min-height: calc(100vh - 111px);
        }
      }
    </style>
  </head>
  <body class="no-model">
    <main>
      <header>
        <h1>Survey 3D Filter Viewer</h1>
        <div class="controls">
          <label for="model-file">3Dモデル</label>
          <input id="model-file" type="file" accept=".glb,.gltf,model/gltf-binary,model/gltf+json" />
          <label for="filter-file">主観フィルタ</label>
          <input id="filter-file" type="file" accept="image/png,image/jpeg,image/webp" />
          <button id="subjective-toggle" type="button" aria-pressed="true">主観</button>
        </div>
      </header>

      <section class="viewer-shell" aria-label="3D viewer">
        <div class="demo-space" aria-hidden="true">
          <div class="demo-floor"></div>
          <div class="demo-axis"></div>
          <div class="demo-card">
            確認用の仮3D空間です。視点高さは地面から1500mm想定。models/model.glb を置くか「3Dモデル」から選ぶと、実モデル表示に切り替わります。
          </div>
        </div>

        <model-viewer
          id="viewer"
          src="models/model.glb"
          camera-controls
          camera-target="0m 1.5m 0m"
          camera-orbit="0deg 82deg 6m"
          field-of-view="45deg"
          auto-rotate
          ar
          shadow-intensity="0.85"
          exposure="1"
          alt="Survey 3D model"
        >
          <div class="fallback" slot="error">
            models/model.glb が見つかりません。modelsフォルダに3Dモデルを置くか、「3Dモデル」から .glb/.gltf を選択してください。
          </div>
        </model-viewer>

        <div id="subjective-filter" class="subjective-filter active" aria-hidden="true">
          <img id="filter-image" src="filters/subjective-filter.png" alt="" />
          <div class="filter-reticle"></div>
        </div>

        <div id="status" class="status">
          model: models/model.glb / filter: filters/subjective-filter.png / 視点高: 1500mm / 左ドラッグで視点変更
        </div>
      </section>
    </main>

    <script>
      const viewer = document.querySelector("#viewer");
      const viewerShell = document.querySelector(".viewer-shell");
      const modelInput = document.querySelector("#model-file");
      const filterInput = document.querySelector("#filter-file");
      const filterLayer = document.querySelector("#subjective-filter");
      const filterImage = document.querySelector("#filter-image");
      const subjectiveToggle = document.querySelector("#subjective-toggle");
      const status = document.querySelector("#status");

      let modelUrl;
      let filterUrl;
      let modelName = "models/model.glb";
      let filterName = "filters/subjective-filter.png";
      const eyeHeightMeters = 1.5;
      let dragging = false;
      let lastPointerX = 0;
      let lastPointerY = 0;
      let demoTurn = 38;
      let demoTilt = -18;

      function updateStatus() {
        status.textContent = `model: ${modelName} / filter: ${filterName} / 視点高: 1500mm / 左ドラッグで視点変更`;
      }

      function updateDemoCamera() {
        viewerShell.style.setProperty("--demo-turn", `${demoTurn}deg`);
        viewerShell.style.setProperty("--demo-tilt", `${demoTilt}deg`);
      }

      modelInput.addEventListener("change", () => {
        const file = modelInput.files && modelInput.files[0];
        if (!file) return;

        if (modelUrl) URL.revokeObjectURL(modelUrl);
        modelUrl = URL.createObjectURL(file);
        viewer.src = modelUrl;
        viewer.setAttribute("camera-target", `0m ${eyeHeightMeters}m 0m`);
        viewer.setAttribute("camera-orbit", "0deg 82deg 6m");
        modelName = file.name;
        document.body.classList.add("no-model");
        updateStatus();
      });

      filterInput.addEventListener("change", () => {
        const file = filterInput.files && filterInput.files[0];
        if (!file) return;

        if (filterUrl) URL.revokeObjectURL(filterUrl);
        filterUrl = URL.createObjectURL(file);
        filterImage.src = filterUrl;
        filterName = file.name;
        filterLayer.classList.remove("use-reticle");
        updateStatus();
      });

      viewer.addEventListener("load", () => {
        document.body.classList.remove("no-model");
      });

      viewer.addEventListener("error", () => {
        document.body.classList.add("no-model");
      });

      filterImage.addEventListener("error", () => {
        filterLayer.classList.add("use-reticle");
      });

      filterImage.addEventListener("load", () => {
        filterLayer.classList.remove("use-reticle");
      });

      subjectiveToggle.addEventListener("click", () => {
        const active = subjectiveToggle.getAttribute("aria-pressed") !== "true";
        subjectiveToggle.setAttribute("aria-pressed", String(active));
        filterLayer.classList.toggle("active", active);
      });

      viewerShell.addEventListener("pointerdown", (event) => {
        if (event.button !== 0 || !document.body.classList.contains("no-model")) return;
        dragging = true;
        lastPointerX = event.clientX;
        lastPointerY = event.clientY;
        viewerShell.classList.add("dragging");
        viewerShell.setPointerCapture(event.pointerId);
      });

      viewerShell.addEventListener("pointermove", (event) => {
        if (!dragging) return;
        const deltaX = event.clientX - lastPointerX;
        const deltaY = event.clientY - lastPointerY;
        lastPointerX = event.clientX;
        lastPointerY = event.clientY;
        demoTurn += deltaX * 0.35;
        demoTilt = Math.max(-70, Math.min(25, demoTilt - deltaY * 0.25));
        updateDemoCamera();
      });

      viewerShell.addEventListener("pointerup", (event) => {
        dragging = false;
        viewerShell.classList.remove("dragging");
        if (viewerShell.hasPointerCapture(event.pointerId)) {
          viewerShell.releasePointerCapture(event.pointerId);
        }
      });

      viewerShell.addEventListener("pointercancel", () => {
        dragging = false;
        viewerShell.classList.remove("dragging");
      });

      updateDemoCamera();
    </script>
  </body>
</html>
